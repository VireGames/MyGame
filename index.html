<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Primer 3D - El Primo</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; }
    </style>
</head>
<body>

    <!-- Importamos la librería Three.js para renderizar 3D real -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // 1. CREAR LA ESCENA (El universo 3D)
        const escena = new THREE.Scene();

        // 2. CREAR LA CÁMARA (Para ver el mundo 3D)
        const camara = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camara.position.z = 5; // Alejamos la cámara para ver el objeto

        // 3. EL RENDERIZADOR (El motor que dibuja los gráficos en el iPhone)
        const renderizador = new THREE.WebGLRenderer({ antialias: true });
        renderizador.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderizador.domElement);

        // 4. CREAR EL OBJETO 3D (Un cubo con geometría y material)
        const geometria = new THREE.BoxGeometry(2, 2, 2); // Ancho, alto y profundidad en 3D
        const material = new THREE.MeshStandardMaterial({ color: 0x00ff88, roughness: 0.3 });
        const cubo = new THREE.Mesh(geometria, material);
        escena.add(cubo); // Metemos el cubo en nuestro universo

        // 5. AÑADIR LUZ (Si no hay luz, el 3D se ve completamente negro)
        const luzLado = new THREE.DirectionalLight(0xffffff, 1);
        luzLado.position.set(5, 5, 5); // Posición de la luz en ejes X, Y, Z
        escena.add(luzLado);

        const luzAmbiente = new THREE.AmbientLight(0x333333); // Luz suave de fondo
        escena.add(luzAmbiente);

        // 6. EL BUCLE DE ANIMACIÓN (Para que se mueva)
        function animar() {
            requestAnimationFrame(animar);

            // Programamos la rotación del cubo en los tres ejes
            cubo.rotation.x += 0.01;
            cubo.rotation.y += 0.01;
            cubo.rotation.z += 0.005;

            // Renderizamos la escena con la cámara
            renderizador.render(escena, camara);
        }

        // Ejecutar la animación
        animar();

        // Ajustar el tamaño si giras el iPhone
        window.addEventListener('resize', () => {
            camara.aspect = window.innerWidth / window.innerHeight;
            camara.updateProjectionMatrix();
            renderizador.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
